name: Build and Test

on: [push]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6.0.0
      with:
        persist-credentials: false
    - uses: actions/setup-python@v6.1.0
      with:
        python-version: '3.11'
        cache: 'pipenv'   # caching pipenv dependencies
    - name: Install pipenv and pipx
      run: |
        pip install pipenv && pip install pipx

    - name: Install global dependencies
      run: |
        pipx install isort && pipx install black && pipx install bandit && \
        pipx install pylint && pipx install pre-commit && pipx install poetry

    - name: Install Dependencies
      run: pipenv install --dev --skip-lock

    - name: Run Makefile
      run: make check
    - name: Run make
      run: pipenv run make publish
    - name: Upload Package
      uses: actions/upload-artifact@v5.0.0
      with:
        name: packages
        path: dist/
        if-no-files-found: error
        retention-days: 1


  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/find-known-secrets
    permissions:
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing
    # if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags')
    steps:
    - name: Get packages
      uses: actions/download-artifact@v6.0.0
      with:
        name: packages
        path: dist/
    - name: Publish package distributions to PyPI
      uses: pypa/gh-action-pypi-publish@v1.13.0
    needs: build
